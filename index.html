<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Aadiiitya Patil</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background-color: black;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
    }

    h1 {
      color: white;
      font-size: 3rem;
      font-family: Arial, sans-serif;
      letter-spacing: 3px;
      animation: glowMove 3s infinite alternate ease-in-out;
    }

    @keyframes glowMove {
      0% {
        transform: scale(1);
        text-shadow: 0 0 5px #fff, 0 0 10px #fff;
      }
      50% {
        transform: scale(1.1);
        text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
      }
      100% {
        transform: scale(1);
        text-shadow: 0 0 10px #fff, 0 0 20px #fff;
      }
    }
  </style>
</head>
<body>
  <h1>Aadiiitya Patil</h1>
</body>
</html>
