AWSTemplateFormatVersion: '2010-09-09'
Description: Creates IAM User Aadiitya, DevOps Group with full access to EC2, VPC, S3, EKS, IAM, CloudWatch, RDS, CloudTrail, CloudFront, Route53

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, prod]
    Description: Environment name

Resources:
  # ==================== IAM GROUP - DevOps ====================
  DevOpsGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: DevOps
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEC2FullAccess
        - arn:aws:iam::aws:policy/AmazonVPCFullAccess
        - arn:aws:iam::aws:policy/AmazonS3FullAccess
        - arn:aws:iam::aws:policy/AmazonEKS_FullAccess
        - arn:aws:iam::aws:policy/IAMFullAccess
        - arn:aws:iam::aws:policy/CloudWatchFullAccess
        - arn:aws:iam::aws:policy/AmazonRDSFullAccess
        - arn:aws:iam::aws:policy/AWSCloudTrail_FullAccess
        - arn:aws:iam::aws:policy/CloudFrontFullAccess
        - arn:aws:iam::aws:policy/AmazonRoute53FullAccess
      Tags:
        - Key: Name
          Value: DevOps-Group
        - Key: Environment
          Value: !Ref Environment

  # ==================== IAM USER - Aadiitya ====================
  AadiityaUser:
    Type: AWS::IAM::User
    Properties:
      UserName: Aadiitya
      Tags:
        - Key: Name
          Value: Aadiitya
        - Key: Environment
          Value: !Ref Environment

  # Add User to DevOps Group
  AddUserToGroup:
    Type: AWS::IAM::UserToGroupAddition
    Properties:
      GroupName: !Ref DevOpsGroup
      Users:
        - !Ref AadiityaUser

  # ==================== IAM Access Key for Aadiitya ====================
  AadiityaAccessKey:
    Type: AWS::IAM::AccessKey
    Properties:
      UserName: !Ref AadiityaUser

Outputs:
  DevOpsGroupName:
    Description: Name of the DevOps IAM Group
    Value: !Ref DevOpsGroup

  AadiityaUserName:
    Description: IAM Username
    Value: !Ref AadiityaUser

  AadiityaAccessKeyId:
    Description: Access Key ID for Aadiitya
    Value: !Ref AadiityaAccessKey

  AadiityaSecretAccessKey:
    Description: Secret Access Key for Aadiitya (Store this securely!)
    Value: !GetAtt AadiityaAccessKey.SecretAccessKey
    # Warning: This will be shown in CloudFormation console/output
