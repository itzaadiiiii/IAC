AWSTemplateFormatVersion: 2010-09-09
Description: ---
Metadata: {
  "AWS::CloudFormation::Interface": {
    "ParameterGroups": [
      {
        "Label": { "default": "VPC Configuration" },
        "Parameters": [ "myVPC" ]
      }
    ],
    "ParameterLabels": {
      "myVPC": { "default": "VPC CIDR Block" }
    }
  }
}

Resources:
  myVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: my-vpc
      InstanceTenancy: default